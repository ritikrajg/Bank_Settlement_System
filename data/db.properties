# ============================================================
# Bank Settlement Application — JDBC Connection Configuration
# ============================================================
# Copy this file to your classpath root (e.g. src/main/resources)
# and update the values to match your PostgreSQL installation.
# ============================================================

# JDBC URL — update host, port and database name as needed
db.url=jdbc:postgresql://localhost:5432/bank_settlement

# PostgreSQL credentials
db.username=postgres
db.password=root


# Driver class (do not change for PostgreSQL)
db.driver=org.postgresql.Driver

# ============================================================
# Setup instructions:
#
#   1. Install PostgreSQL 14+ and create the database:
#        createdb -U postgres bank_settlement
#
#   2. Run the DDL script:
#        psql -U postgres -d bank_settlement -f schema.sql
#
#   3. Download the PostgreSQL JDBC driver JAR from:
#        https://jdbc.postgresql.org/download/
#      Place it on your classpath when compiling/running.
#
#   4. Compile all sources:
#        javac -cp .:postgresql-42.x.x.jar \
#              -d out \
#              $(find src -name "*.java")
#
#   5. Run the demo:
#        java -cp out:postgresql-42.x.x.jar \
#             com.bank.settlement.Main
# ============================================================
